# Aramo — nginx front door (Front-Door Migration PR-2, ADR-0023). Built INERT:
# this config is baked + CI-gated but the service is profile-gated in compose and
# publishes no ports until the PR-3 cutover flip. Minimal top-level config per
# Ruling 1 — all server blocks live in templates/aramo.conf.template, materialized
# by the official image's envsubst at container start into /etc/nginx/conf.d/.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;

  # Parity delta (documented in README): stock nginx compresses gzip only; Caddy
  # did gzip + zstd. No WebSocket provisions — the front-door audit found zero
  # realtime (no websocket/SSE) usage.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml application/xml+rss text/javascript image/svg+xml;

  # The materialized server blocks (envsubst output). The default.conf that ships
  # in the base image is removed in the Dockerfile so only ours is included.
  include /etc/nginx/conf.d/*.conf;
}
