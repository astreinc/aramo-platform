# deploy/public/nginx.conf — Aramo public-site hardened front-door (PUB-1 PR-1b, §3.1 + G0-R3).
#
# BAKED CONFIG: this file is copied into the image at build time. A change here
# needs an image REBUILD + container RECREATE, never a live edit — the config is
# part of the artifact, mirroring the deploy/caddy image precedent.
#
# One certbot cert, SANs aramo.ai + www.aramo.ai + staging.aramo.ai:
#   :80   all three names — ACME HTTP-01 webroot challenge, else 301 to https
#   :443  aramo.ai         — branded holding page (baked /usr/share/nginx/holding)
#   :443  www.aramo.ai     — 301 -> https://aramo.ai$request_uri
#   :443  staging.aramo.ai — full Astro site (baked) behind basic-auth (MOUNTED htpasswd)
#
# TLS certs live under /etc/letsencrypt (mounted volume in prod). The image bakes
# a self-signed fallback at the same path so nginx boots when the volume is not
# mounted (build-time `nginx -t`, local smoke); the prod mount shadows it.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server_tokens off;
  sendfile on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # TLS baseline (>= 1.2, modern ciphers) — inherited by every 443 server below.
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Docker's embedded DNS — lets the /intake/ proxy resolve the compose service
  # name at REQUEST time (via the variable proxy_pass below) instead of at config
  # load, so `nginx -t` at image-build time doesn't fail on an unresolvable
  # upstream (the public-intake container only exists on the compose network).
  resolver 127.0.0.11 valid=30s ipv6=off;

  # ---- :80 — ACME challenge + redirect to https (all three names) ----
  server {
    listen 80;
    listen [::]:80;
    server_name aramo.ai www.aramo.ai staging.aramo.ai;

    # Certbot webroot (mounted volume): renewals answer the HTTP-01 challenge
    # in-band, so the running nginx never has to stop for a renew.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---- :443 aramo.ai — branded holding page ----
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aramo.ai;

    ssl_certificate /etc/letsencrypt/live/aramo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aramo.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    # CSP (R-PUB5-7 + D-PUB5-CSP-STYLE-1): inline content is allow-listed by
    # sha256 hash instead of 'unsafe-inline', for two directives:
    #   script-src — the TWO Astro client:visible hydration bootstraps (the
    #                IntersectionObserver + the <astro-island> runtime script);
    #   style-src  — the ONE inline <style> that survives on island pages,
    #                Astro's fixed `astro-island{display:contents}` reset (all
    #                authored/scoped CSS is externalised via astro.config
    #                build.inlineStylesheets:'never', so nothing else is inline).
    # The script hashes are Astro-VERSION-COUPLED *and* BUILD-PLATFORM-coupled
    # (the runtime minifies differently on linux vs macOS) — these are the LINUX
    # (deploy/CI) build hashes. The authoritative gate is the IMAGE build
    # (deploy/public/Dockerfile runs verify-csp-hashes.mjs inside the linux node
    # stage and FAILS on drift for BOTH directives). A local macOS run mismatches
    # by design — trust the image build. RETEST-WHEN astro/@astrojs/react is
    # upgraded, or any client directive other than client:visible is introduced.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-Q2BPg90ZMplYY+FSdApNErhpWafg2hcRRbndmvxuL/Q=' 'sha256-Ya0pUYrC7nM5Cn/056TyVuEiz6dFGrzmkWzgON0pF0U='; style-src 'self' 'sha256-vv9IoKo7BSLbWcUHr3tNmfNVmm5L/9Cfn2H6LMk7/ow='" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/holding;
    index index.html;

    # Intake handler (PUB-5): POST-only proxy to the compose-internal service.
    # healthz is NOT routed (compose-internal only). Body cap at the edge.
    location /intake/ {
      limit_except POST {
        deny all;
      }
      set $intake_upstream public-intake:3000;
      proxy_pass http://$intake_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      client_max_body_size 16k;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # ---- :443 www.aramo.ai — canonical redirect to the apex ----
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.aramo.ai;

    ssl_certificate /etc/letsencrypt/live/aramo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aramo.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    return 301 https://aramo.ai$request_uri;
  }

  # ---- :443 staging.aramo.ai — full Astro site behind basic-auth ----
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.aramo.ai;

    ssl_certificate /etc/letsencrypt/live/aramo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aramo.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    # CSP (R-PUB5-7 + D-PUB5-CSP-STYLE-1): inline content is allow-listed by
    # sha256 hash instead of 'unsafe-inline', for two directives:
    #   script-src — the TWO Astro client:visible hydration bootstraps (the
    #                IntersectionObserver + the <astro-island> runtime script);
    #   style-src  — the ONE inline <style> that survives on island pages,
    #                Astro's fixed `astro-island{display:contents}` reset (all
    #                authored/scoped CSS is externalised via astro.config
    #                build.inlineStylesheets:'never', so nothing else is inline).
    # The script hashes are Astro-VERSION-COUPLED *and* BUILD-PLATFORM-coupled
    # (the runtime minifies differently on linux vs macOS) — these are the LINUX
    # (deploy/CI) build hashes. The authoritative gate is the IMAGE build
    # (deploy/public/Dockerfile runs verify-csp-hashes.mjs inside the linux node
    # stage and FAILS on drift for BOTH directives). A local macOS run mismatches
    # by design — trust the image build. RETEST-WHEN astro/@astrojs/react is
    # upgraded, or any client directive other than client:visible is introduced.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-Q2BPg90ZMplYY+FSdApNErhpWafg2hcRRbndmvxuL/Q=' 'sha256-Ya0pUYrC7nM5Cn/056TyVuEiz6dFGrzmkWzgON0pF0U='; style-src 'self' 'sha256-vv9IoKo7BSLbWcUHr3tNmfNVmm5L/9Cfn2H6LMk7/ow='" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # The htpasswd is MOUNTED (/etc/nginx/auth/.htpasswd), never baked, so the
    # staging credential rotates without an image rebuild.
    auth_basic "Aramo staging";
    auth_basic_user_file /etc/nginx/auth/.htpasswd;

    root /usr/share/nginx/site;
    index index.html;

    # Serve the Astro-built 404 shell for unknown paths.
    error_page 404 /404.html;

    # Intake handler (PUB-5): POST-only proxy, behind this block's basic-auth.
    location /intake/ {
      limit_except POST {
        deny all;
      }
      set $intake_upstream public-intake:3000;
      proxy_pass http://$intake_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      client_max_body_size 16k;
    }

    location / {
      try_files $uri $uri/ =404;
    }
  }
}
