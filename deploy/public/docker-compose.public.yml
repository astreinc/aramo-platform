# deploy/public/docker-compose.public.yml — Aramo public-site host composition
# (PUB-1 PR-1b, §3.1). One nginx service serving the apex holding page, the
# www→apex redirect, and the basic-auth-gated staging Astro site.
#
# The image is BAKED (site + holding page + nginx.conf). Certs and the staging
# htpasswd are the ONLY runtime inputs, supplied as host bind mounts:
#   /etc/letsencrypt          — certbot cert store (host); mounted read-only
#   /srv/aramo-public/certbot — ACME HTTP-01 webroot; certbot (host) writes,
#                               nginx serves — shared so renewals never stop nginx
#   /srv/aramo-public/auth    — the staging .htpasswd (host); mounted read-only
#
# Bring-up, cert issuance, renewal, and the landed-proof assertion live in
# README.md — that runbook is the deploy path until Terraform user-data
# automates it.

services:
  public-web:
    image: ghcr.io/astreinc/aramo-public-web:latest
    container_name: aramo-public-web
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /srv/aramo-public/certbot:/var/www/certbot
      - /srv/aramo-public/auth:/etc/nginx/auth:ro

  # PUB-5 — intake handler (form → SES). Compose-network only (NO published
  # ports); nginx proxies /intake/ to public-intake:3000. Every env var is
  # passed BY NAME — each MUST also exist in the host .env (deploy-path defect
  # class: a compose line without the matching host .env entry silently ships an
  # empty value). The runbook enumerates all seven. AWS creds are the narrow
  # SES-send key (TF-created user, PO-created key — R-PUB5-3), never the box's.
  public-intake:
    image: ghcr.io/astreinc/aramo-public-intake:latest
    container_name: aramo-public-intake
    restart: unless-stopped
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - INTAKE_FROM_ADDRESS
      - INTAKE_TO_ADDRESS
      - PUBLIC_SITE_BASE_URL
      - INTAKE_RATE_LIMIT_PER_HOUR
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/intake/healthz',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
