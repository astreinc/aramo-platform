apis:
  common:
    root: openapi/common.yaml
  ats:
    root: openapi/ats.yaml
  portal:
    root: openapi/portal.yaml
  ingestion:
    root: openapi/ingestion.yaml
  auth:
    root: openapi/auth.yaml
    rules:
      # PR-8.0a-Reground: GET /auth/{consumer}/login is intentionally a
      # 302-only endpoint (per directive §8.1 success response). The
      # redirect IS the success path; there is no 2xx variant. Override
      # the workspace-level rule for auth.yaml only.
      operation-2xx-response: off
extends:
  - minimal
rules:
  # PR-2 re-enables four of the seven PR-1-disabled rules. They are now
  # satisfied by the populated common.yaml and pass vacuously against the
  # three still-empty scaffolds (no operations / no tags = nothing to check).
  tag-description: error
  operation-description: error
  operation-2xx-response: error
  operation-operationId: error

  # Still disabled — these need a per-file source of truth that has not
  # been decided yet:
  #   no-empty-servers — ats.yaml, portal.yaml, ingestion.yaml are still
  #     PR-1 empty scaffolds (no `servers` block). Re-enable once each
  #     file is populated by its own PR.
  #   info-license / info-license-url — license decision pending
  #     (ADR-0001 deferred-strict list).
  #   info-contact — contact info decision pending.
  no-empty-servers: off
  info-license: off
  info-license-url: off
  info-contact: off
