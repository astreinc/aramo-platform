# Aramo Core CI — CI-Velocity lanes (Aramo-CI-Velocity-Directive-v1_0-LOCKED §PR-2).
#
# THREE lanes, ONE workflow:
#   • pull_request  — the FAST lane: nx `affected` for test/lint/build + affected
#                     integration roots; terraform + docker path-filtered; the
#                     cheap walls stay UNCONDITIONAL required checks (byte-for-byte).
#   • merge_group   — the FULL gate: run-many --all unit/lint/build + full serial
#                     integration + full pact + all walls, on the queued merge
#                     result before it lands on main. deployment-gate requires it.
#   • schedule      — nightly full-serial drift run on main (never blocks a PR).
#
# Invariant: no job is skipped-to-blocked. Affected/path-filtered work NO-OPS
# INTERNALLY (exits 0) when not applicable, so every required check still reports
# success/failure — never "skipped" — keeping branch protection + deployment-gate
# valid. Walls are NEVER affected-scoped (Charter).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 7 * * *' # nightly full-serial drift detector (07:00 UTC)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-filter helper (PR lane only). Non-PR events run everything full, so its
  # outputs are read solely under `github.event_name == 'pull_request'` guards.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      docker: ${{ steps.dockerjson.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            terraform:
              - 'infrastructure/**'
            api:
              - 'apps/api/**'
              - 'libs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            auth-service:
              - 'apps/auth-service/**'
              - 'libs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            platform-admin:
              - 'apps/platform-admin/**'
              - 'libs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            caddy:
              - 'deploy/caddy/**'
            public-web:
              - 'apps/public-web/**'
              - 'deploy/public/**'
              - 'package.json'
              - 'package-lock.json'
            public-intake:
              - 'apps/public-intake/**'
              - 'package.json'
              - 'package-lock.json'
      - id: dockerjson
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            printf 'json={"api":"%s","auth-service":"%s","platform-admin":"%s","caddy":"%s","public-web":"%s","public-intake":"%s"}\n' \
              "${{ steps.filter.outputs.api }}" \
              "${{ steps.filter.outputs.auth-service }}" \
              "${{ steps.filter.outputs.platform-admin }}" \
              "${{ steps.filter.outputs.caddy }}" \
              "${{ steps.filter.outputs.public-web }}" \
              "${{ steps.filter.outputs.public-intake }}" >> "$GITHUB_OUTPUT"
          else
            echo 'json={"api":"true","auth-service":"true","platform-admin":"true","caddy":"true","public-web":"true","public-intake":"true"}' >> "$GITHUB_OUTPUT"
          fi

  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT

  prisma-validate:
    name: prisma:validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run prisma:validate

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # nx affected needs history
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - uses: nrwl/nx-set-shas@v4
        if: github.event_name == 'pull_request'
      - name: lint (affected on PR, all otherwise)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t lint
          else
            npx nx run-many -t lint --all
          fi

  build:
    name: build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run prisma:generate
      - uses: nrwl/nx-set-shas@v4
        if: github.event_name == 'pull_request'
      - name: build (affected on PR, all otherwise)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t build
          else
            npx nx run-many -t build --all
          fi

  # Builds every deployable image through its real Dockerfile — the artifact that
  # actually ships. On a PR the images are PATH-FILTERED to their contexts (the
  # standalone caddy image skips unless deploy/caddy changed; the app images
  # rebuild on any apps/libs change since they bundle the monorepo). On
  # merge_group / push / schedule ALL images build. On push to main they are also
  # pushed SHA-tagged + :latest to GHCR (deploy provenance).
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [install, changes]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api, dockerfile: apps/api/Dockerfile }
          - { name: auth-service, dockerfile: apps/auth-service/Dockerfile }
          - { name: platform-admin, dockerfile: apps/platform-admin/Dockerfile }
          - { name: caddy, dockerfile: deploy/caddy/Dockerfile }
          - { name: public-web, dockerfile: deploy/public/Dockerfile }
          - { name: public-intake, dockerfile: apps/public-intake/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        if: ${{ fromJSON(needs.changes.outputs.docker)[matrix.name] == 'true' }}
      - name: Log in to GHCR (main only)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && fromJSON(needs.changes.outputs.docker)[matrix.name] == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image (and push on main)
        if: ${{ fromJSON(needs.changes.outputs.docker)[matrix.name] == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aramo-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/aramo-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
      - name: No-op (context unchanged on PR)
        if: ${{ fromJSON(needs.changes.outputs.docker)[matrix.name] != 'true' }}
        run: echo "::notice::${{ matrix.name }} image context unchanged on this PR — build skipped (merge queue rebuilds it)."

  test-unit:
    name: test:unit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run prisma:generate
      - uses: nrwl/nx-set-shas@v4
        if: github.event_name == 'pull_request'
      - name: test:unit (affected on PR, all otherwise)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t test
          else
            npx nx run-many -t test --all
          fi

  openapi-validate:
    name: openapi:validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run openapi:validate

  openapi-lint:
    name: openapi:lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run openapi:lint

  lint-nx-boundaries:
    name: lint:nx-boundaries
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run lint:nx-boundaries

  verify-vocabulary:
    name: verify:vocabulary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash scripts/verify-vocabulary.sh

  # ---------------------------------------------------------------------------
  # Refusal enforcement + drift detection. Scripts live in ci/scripts/. These
  # walls are UNCONDITIONAL required checks on every lane (never affected-scoped).
  # ---------------------------------------------------------------------------

  openapi-drift-check:
    name: openapi:drift-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run openapi:drift-check

  portal-refusal-check:
    name: portal:refusal-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run portal:refusal-check

  ats-refusal-check:
    name: ats:refusal-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run ats:refusal-check

  ingestion-refusal-check:
    name: ingestion:refusal-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run ingestion:refusal-check

  version-sync-check:
    name: version:sync-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run version:sync-check

  error-codes-check:
    name: error-codes:check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run error-codes:check

  identity-index-privacy-wall:
    name: identity-index:privacy-wall
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run identity-index:privacy-wall

  pact-consumer:
    name: pact:consumer
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      # M6 PR-1 — bounded retry for the irreducible pact-rust mock-server
      # port-reuse race. k=3 projects job failure to < 0.5%.
      - name: Run pact:consumer (with bounded retry for pact-rust race)
        run: |
          set -e
          ATTEMPTS=3
          for attempt in $(seq 1 $ATTEMPTS); do
            if npm run pact:consumer; then
              echo "pact:consumer passed on attempt $attempt"
              exit 0
            fi
            echo "::warning::pact:consumer failed attempt $attempt of $ATTEMPTS (suspected pact-rust race; HK-M6)"
          done
          echo "::error::pact:consumer failed after $ATTEMPTS attempts"
          exit 1
      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pact/pacts/
          if-no-files-found: error
          retention-days: 1

  pact-provider:
    name: pact:provider
    runs-on: ubuntu-latest
    needs: [install, pact-consumer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run prisma:generate
      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: pact/pacts/
      - run: npm run pact:provider

  # Integration: SERIAL always (harness hardening). On a PR, only the AFFECTED
  # roots run (ci-integration.sh reads nx affected); on merge_group / push /
  # schedule, ALL 16 roots run. An affected-empty PR runs zero roots → exits 0
  # (success, not skipped).
  tests-integration:
    name: tests:integration
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci || npm ci || npm ci # retry: free-email-domains postinstall fetches 3 third-party hosts and hard-exits on a transient ETIMEDOUT
      - run: npm run prisma:generate
      - uses: nrwl/nx-set-shas@v4
        if: github.event_name == 'pull_request'
      - name: integration (affected serial on PR, full serial otherwise)
        env:
          CI_AFFECTED: ${{ github.event_name == 'pull_request' && '1' || '0' }}
        run: bash ci/scripts/ci-integration.sh

  # ---------------------------------------------------------------------------
  # Terraform IaC gates — PATH-FILTERED to infrastructure/ on a PR (no-op when
  # unchanged, so the required check still reports success); full on other lanes.
  # ---------------------------------------------------------------------------

  terraform-fmt:
    name: terraform:fmt
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '>= 1.6.0'
      - name: Terraform fmt check
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.terraform == 'true' }}
        run: terraform fmt -check -recursive infrastructure/
      - name: No-op (infrastructure/ unchanged on PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.terraform != 'true' }}
        run: echo "::notice::infrastructure/ unchanged on this PR — terraform:fmt skipped (merge queue runs it)."

  terraform-validate:
    name: terraform:validate
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        environment: [dev, staging, prod, public-site]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '>= 1.6.0'
      - name: Terraform init + validate
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.terraform == 'true' }}
        run: |
          cd infrastructure/environments/${{ matrix.environment }}
          terraform init -backend=false
          terraform validate
      - name: No-op (infrastructure/ unchanged on PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.terraform != 'true' }}
        run: echo "::notice::infrastructure/ unchanged on this PR — terraform:validate (${{ matrix.environment }}) skipped."

  terraform-lint:
    name: terraform:lint
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - name: tflint
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.terraform == 'true' }}
        run: |
          tflint --init
          tflint --recursive --minimum-failure-severity=warning
      - name: No-op (infrastructure/ unchanged on PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.terraform != 'true' }}
        run: echo "::notice::infrastructure/ unchanged on this PR — terraform:lint skipped."

  terraform-sec:
    name: terraform:sec
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
      # tfsec via direct binary install (M5 HK-M5). Version pinned v1.28.14
      # (ADR-0014 #2); checksum-verified.
      - name: tfsec install + verify + scan
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.terraform == 'true' }}
        run: |
          set -euo pipefail
          TFSEC_VERSION=v1.28.14
          TFSEC_BIN_URL="https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64"
          TFSEC_CHECKSUM_URL="https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec_checksums.txt"
          curl -sSL -o tfsec "${TFSEC_BIN_URL}"
          curl -sSL -o tfsec_checksums.txt "${TFSEC_CHECKSUM_URL}"
          EXPECTED_SHA=$(grep "tfsec-linux-amd64$" tfsec_checksums.txt | awk '{print $1}')
          ACTUAL_SHA=$(sha256sum tfsec | awk '{print $1}')
          if [ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]; then
            echo "::error title=tfsec checksum mismatch::expected=${EXPECTED_SHA} actual=${ACTUAL_SHA}"
            exit 1
          fi
          chmod +x tfsec
          ./tfsec infrastructure --minimum-severity=HIGH
      - name: No-op (infrastructure/ unchanged on PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.terraform != 'true' }}
        run: echo "::notice::infrastructure/ unchanged on this PR — terraform:sec skipped."

  npm-audit:
    name: npm:audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --omit=dev || npm ci --omit=dev || npm ci --omit=dev # retry: transient free-email-domains postinstall ETIMEDOUT
      - run: bash scripts/audit-check.sh

  # ---------------------------------------------------------------------------
  # Deployment-gate aggregator (PR-M0R-3 §4.1, VARIANT B). One PASS/FAIL check
  # that branch protection requires. On merge_group it is the FULL-suite gate; on
  # a PR it aggregates the fast lane (affected/path-filtered jobs report success
  # even when they no-op internally — no "skipped" ever reaches this grep).
  # Override-label discipline (Plan v1.5 §4 Stage 4) preserved.
  # ---------------------------------------------------------------------------
  deployment-gate:
    name: deployment-gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - openapi-validate
      - openapi-lint
      - openapi-drift-check
      - portal-refusal-check
      - ats-refusal-check
      - ingestion-refusal-check
      - version-sync-check
      - error-codes-check
      - identity-index-privacy-wall
      - pact-consumer
      - pact-provider
      - test-unit
      - tests-integration
      - lint-nx-boundaries
      - docker-build
      - terraform-fmt
      - terraform-validate
      - terraform-lint
      - terraform-sec
      - npm-audit
    steps:
      - name: Evaluate override label and justification
        id: override
        uses: actions/github-script@v7
        with:
          script: |
            // Override applies only on pull_request events.
            if (context.eventName !== 'pull_request') {
              core.setOutput('override_active', 'false');
              core.info('Not a pull_request event; override path skipped.');
              return;
            }
            const labels = (context.payload.pull_request?.labels ?? [])
              .map((l) => l.name);
            const hasOverrideLabel = labels.includes('override:ok-to-merge');
            const body = context.payload.pull_request?.body ?? '';
            const justifMatch = body.match(
              /^Override-Justification:\s*(.{40,})$/m,
            );
            if (hasOverrideLabel && justifMatch) {
              core.notice(
                `Override active per PR label override:ok-to-merge with valid justification: ${justifMatch[1].slice(0, 100)}…`,
              );
              core.setOutput('override_active', 'true');
              return;
            }
            if (hasOverrideLabel && !justifMatch) {
              core.setFailed(
                'override:ok-to-merge label present but Override-Justification (≥40 chars) line is missing or too short in PR body. Add a single line beginning "Override-Justification: " followed by ≥40 characters of rationale.',
              );
              return;
            }
            core.setOutput('override_active', 'false');
      - name: Verify all required deployment gates succeeded
        if: steps.override.outputs.override_active != 'true'
        env:
          NEEDS_RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "Needs results: $NEEDS_RESULTS"
          # Fail if any needed job did not succeed (failure, cancelled, or skipped).
          if echo "$NEEDS_RESULTS" | grep -qE '"result":[[:space:]]*"(failure|cancelled|skipped)"'; then
            echo "ERROR: One or more required deployment gates did not succeed."
            exit 1
          fi
          echo "All required deployment gates passed."
