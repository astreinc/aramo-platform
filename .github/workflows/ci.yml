# Aramo Core CI — PR-1 baseline.
#
# Wired gates run against the empty scaffolding. Placeholder gates print a
# GitHub Actions ::notice:: and exit 0 — they are reserved slots that future
# PRs will fill in without restructuring this workflow (per PR-1 Acceptance
# Criteria).

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

  prisma-validate:
    name: prisma:validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run prisma:validate

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx nx run-many --target=lint --all

  build:
    name: build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx nx run-many --target=build --all

  # Builds every deployable image through its real Dockerfile — the artifact
  # that actually ships. The host `build` job above (nx run-many) is a fast,
  # non-required compile signal; it does NOT exercise the Dockerfiles, so a
  # break that only shows up in a clean image build (e.g. a missing ^build
  # dependsOn) passed CI green until now. This job closes that gap and is a
  # REQUIRED gate (wired into deployment-gate `needs`).
  #
  # On a PR: build only (push:false) — proves each image compiles end-to-end.
  # On push to main: also push SHA-tagged + :latest images to GHCR, so deploys
  # pull a CI-built artifact with provenance instead of rebuilding on the box.
  # Registry = GHCR (ghcr.io) via the built-in GITHUB_TOKEN (packages:write) —
  # no extra cloud-auth dance. The box-pull cutover (GHCR login / package
  # visibility) is a deliberate, separately-tested deploy step — see PR body.
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api, dockerfile: apps/api/Dockerfile }
          - { name: auth-service, dockerfile: apps/auth-service/Dockerfile }
          - { name: caddy, dockerfile: deploy/caddy/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Push only on push-to-main; PRs (incl. forks, where GITHUB_TOKEN is
      # read-only) build without pushing.
      - name: Log in to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aramo-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/aramo-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  test-unit:
    name: test:unit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx nx run-many --target=test --all

  openapi-validate:
    name: openapi:validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run openapi:validate

  openapi-lint:
    name: openapi:lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run openapi:lint

  lint-nx-boundaries:
    name: lint:nx-boundaries
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint:nx-boundaries

  verify-vocabulary:
    name: verify:vocabulary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash scripts/verify-vocabulary.sh

  # ---------------------------------------------------------------------------
  # Refusal enforcement + drift detection (PR-M0R-2). Scripts live in
  # ci/scripts/ and exit 0 against the current PR-1 paths: {} scaffolding;
  # enforcement coverage grows as M2-M7 populate Portal/ATS schemas.
  # ---------------------------------------------------------------------------

  openapi-drift-check:
    name: openapi:drift-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run openapi:drift-check

  portal-refusal-check:
    name: portal:refusal-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run portal:refusal-check

  ats-refusal-check:
    name: ats:refusal-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run ats:refusal-check

  ingestion-refusal-check:
    name: ingestion:refusal-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run ingestion:refusal-check

  version-sync-check:
    name: version:sync-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run version:sync-check

  error-codes-check:
    name: error-codes:check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run error-codes:check

  pact-consumer:
    name: pact:consumer
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # M6 PR-1 — bounded retry for the irreducible pact-rust mock-server
      # port-reuse race (~7% warm / ~17% cold per attempt at HEAD 9ac157e
      # after the afterEach setImmediate yield). k=3 projects job failure
      # to < 0.5% (cold 17%³ ≈ 0.5%; warm 6.7%³ ≈ 0.03%). Wraps the
      # umbrella `pact:consumer` (all 5 suites; the retry covers any
      # consumer suite that exhibits the same pact-rust signature).
      # HK-M6 carry-forward for upstream fix in
      # pact-foundation/pact-core or pact-rust (cleanupMockServer should
      # await listener unbind synchronously).
      - name: Run pact:consumer (with bounded retry for pact-rust race)
        run: |
          set -e
          ATTEMPTS=3
          for attempt in $(seq 1 $ATTEMPTS); do
            if npm run pact:consumer; then
              echo "pact:consumer passed on attempt $attempt"
              exit 0
            fi
            echo "::warning::pact:consumer failed attempt $attempt of $ATTEMPTS (suspected pact-rust race; HK-M6)"
          done
          echo "::error::pact:consumer failed after $ATTEMPTS attempts"
          exit 1
      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pact/pacts/
          if-no-files-found: error
          retention-days: 1

  pact-provider:
    name: pact:provider
    runs-on: ubuntu-latest
    needs: [install, pact-consumer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: pact/pacts/
      - run: npm run pact:provider

  tests-integration:
    name: tests:integration
    runs-on: ubuntu-latest
    needs: install
    env:
      ARAMO_RUN_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      # M4 PR-2 §4.6 — extend tests-integration to the full 7 roots that
      # package.json's `tests:integration` AND-chain runs locally. Closes
      # M4 PR-1's oversight (libs/evidence in package.json chain but not
      # the CI workflow) AND the audit-discovered additional gaps
      # (libs/job-domain, libs/talent-evidence, apps/api were also missing
      # from the workflow despite being in the package.json chain). Order
      # mirrors the directive verbatim.
      - run: npx vitest run --root libs/consent
      - run: npx vitest run --root libs/examination
      - run: npx vitest run --root libs/job-domain
      - run: npx vitest run --root libs/matching
      - run: npx vitest run --root libs/talent-evidence
      - run: npx vitest run --root libs/evidence
      - run: npx vitest run --root libs/submittal
      - run: npx vitest run --root apps/api
      - run: npx vitest run --root libs/engagement
      - run: npx vitest run --root libs/ai-draft
      - run: npx vitest run --root libs/identity-index
      # TR-2a-B1 — the resolution-substrate roots. Their integration specs (the
      # source_class acceptance tests + the R1.3 resolve-unchanged proof) were
      # absent from this job, so observed-CI-green never observed them. Added so
      # the slice's own acceptance surface runs in CI.
      - run: npx vitest run --root libs/ingestion
      - run: npx vitest run --root libs/talent-trust
      - run: npx vitest run --root libs/canonicalization

  # ---------------------------------------------------------------------------
  # M4 PR-8 — Terraform IaC foundation gates (no AWS credentials required).
  # `terraform-fmt` and `terraform-validate` enforce formatting + per-env
  # validity for the `infrastructure/` workspace introduced at PR-8.
  # Deeper gates (tflint, tfsec, terraform plan PR-comment) deferred to
  # PR-9 / PR-10 per ADR-0012 Decision 6.
  # ---------------------------------------------------------------------------

  terraform-fmt:
    name: terraform:fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ">= 1.6.0"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/

  terraform-validate:
    name: terraform:validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ">= 1.6.0"
      - name: Terraform init (no backend)
        run: cd infrastructure/environments/${{ matrix.environment }} && terraform init -backend=false
      - name: Terraform validate
        run: cd infrastructure/environments/${{ matrix.environment }} && terraform validate

  # ---------------------------------------------------------------------------
  # M4 PR-9 — tflint extension (deferred from PR-8 per ADR-0012:92).
  # Catches the next class of Terraform errors above fmt + validate:
  # unused variables, deprecated syntax, AWS-provider-specific naming /
  # lifecycle anti-patterns. No AWS credentials required.
  # ---------------------------------------------------------------------------

  terraform-lint:
    name: terraform:lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - name: tflint init
        run: tflint --init
      - name: tflint recursive
        run: tflint --recursive --minimum-failure-severity=warning

  # ---------------------------------------------------------------------------
  # M4 PR-10 — CVE / security scanning gates (deferred from PR-8 / PR-9 per
  # ADR-0012:92 + ADR-0013:227-229). Two gates: `terraform-sec` enforces a
  # HIGH-minimum threshold against the `infrastructure/` Terraform substrate
  # via tfsec; `npm-audit` enforces a HIGH-minimum threshold against the
  # production dependency tree (`--omit=dev`) via an allow-list-aware
  # wrapper script. No AWS credentials required for either gate.
  # See ADR-0014 for the eight CVE-scanning conventions locked at PR-10.
  # ---------------------------------------------------------------------------

  terraform-sec:
    name: terraform:sec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ---------------------------------------------------------------------
      # tfsec via direct binary install (M5 HK-M5; replaces
      # aquasecurity/tfsec-action@v1.0.3 which fails because the action
      # calls api.github.com/repos/aquasecurity/tfsec/releases/latest to
      # discover its binary, and the aquasecurity GitHub organization has
      # an IP allow list that rejects all GitHub-hosted runner IPs from
      # this api.github.com surface. The release-asset CDN at
      # release-assets.githubusercontent.com (Azure blob backend) is not
      # subject to the org-level allow list, so direct binary download
      # bypasses the rejection layer.
      #
      # Version pinned to v1.28.14 per ADR-0014 convention #2 (action/
      # binary versions pinned by tag, not floating). Future bumps via
      # explicit Lead-elected PRs.
      #
      # Checksum verification provides supply-chain integrity defense:
      # the release-assets CDN is GitHub-served but not GitHub-signed; a
      # compromised CDN delivery would be detected at sha256 mismatch.
      #
      # tfsec itself is now part of Trivy (upstream deprecation notice
      # at github.com/aquasecurity/tfsec); a future M5 or M6 housekeeping
      # PR may migrate this step to trivy. Until then, tfsec v1.28.14
      # is the locked baseline.
      # ---------------------------------------------------------------------
      - name: tfsec install + verify
        run: |
          set -euo pipefail
          TFSEC_VERSION=v1.28.14
          TFSEC_BIN_URL="https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64"
          TFSEC_CHECKSUM_URL="https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec_checksums.txt"
          curl -sSL -o tfsec "${TFSEC_BIN_URL}"
          curl -sSL -o tfsec_checksums.txt "${TFSEC_CHECKSUM_URL}"
          EXPECTED_SHA=$(grep "tfsec-linux-amd64$" tfsec_checksums.txt | awk '{print $1}')
          ACTUAL_SHA=$(sha256sum tfsec | awk '{print $1}')
          if [ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]; then
            echo "::error title=tfsec checksum mismatch::expected=${EXPECTED_SHA} actual=${ACTUAL_SHA}"
            exit 1
          fi
          chmod +x tfsec
          echo "tfsec ${TFSEC_VERSION} installed; sha256 verified"
      - name: tfsec scan infrastructure/
        run: |
          ./tfsec infrastructure --minimum-severity=HIGH

  npm-audit:
    name: npm:audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --omit=dev
      - run: bash scripts/audit-check.sh

  # ---------------------------------------------------------------------------
  # Deployment-gate aggregator (PR-M0R-3 §4.1, VARIANT B — in-ci.yml).
  #
  # Single aggregator job wiring the named CI gates from Plan v1.5 §4
  # Stage 4 as `needs:` dependencies. Provides one PASS/FAIL status check
  # that GitHub branch-protection rules can require to block invalid
  # deployments (Plan v1.5 §6 DoD #6 — "CI blocks invalid deployments
  # (deployment-gate.yml enforcing all checks)").
  #
  # VARIANT choice: aggregator-in-ci.yml. The directive's §4.1 first
  # preference was a separate deployment-gate.yml file with cross-workflow
  # `needs:` references; GitHub Actions does not support cross-workflow
  # `needs:` natively (only `workflow_run` async). Directive §4.1
  # explicitly authorizes the in-ci.yml aggregator as functionally
  # identical and cleaner; chosen here.
  #
  # `if: always()` is required so this job runs even when needed jobs
  # fail — the override-label step (per §4.2) can then decide whether
  # to pass anyway. Without `if: always()`, a failing needed job would
  # skip this aggregator and the override could never apply.
  #
  # Override-label discipline per Plan v1.5 §4 Stage 4.
  # Use of `override:ok-to-merge` label requires a written
  # `Override-Justification: <≥40 chars>` line in the PR body.
  # Override usage should be rare and explicit; pattern is recorded
  # in milestone closure records for audit trail.
  # ---------------------------------------------------------------------------

  deployment-gate:
    name: deployment-gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - openapi-validate
      - openapi-lint
      - openapi-drift-check
      - portal-refusal-check
      - ats-refusal-check
      - ingestion-refusal-check
      - version-sync-check
      - error-codes-check
      - pact-consumer
      - pact-provider
      - test-unit
      - tests-integration
      - lint-nx-boundaries
      - docker-build
      - terraform-fmt
      - terraform-validate
      - terraform-lint
      - terraform-sec
      - npm-audit
    steps:
      - name: Evaluate override label and justification
        id: override
        uses: actions/github-script@v7
        with:
          script: |
            // Override applies only on pull_request events. For push to main,
            // skip the override path entirely (the needs-status check below
            // is the sole gate).
            if (context.eventName !== 'pull_request') {
              core.setOutput('override_active', 'false');
              core.info('Not a pull_request event; override path skipped.');
              return;
            }
            const labels = (context.payload.pull_request?.labels ?? [])
              .map((l) => l.name);
            const hasOverrideLabel = labels.includes('override:ok-to-merge');
            const body = context.payload.pull_request?.body ?? '';
            const justifMatch = body.match(
              /^Override-Justification:\s*(.{40,})$/m,
            );
            if (hasOverrideLabel && justifMatch) {
              core.notice(
                `Override active per PR label override:ok-to-merge with valid justification: ${justifMatch[1].slice(0, 100)}…`,
              );
              core.setOutput('override_active', 'true');
              return;
            }
            if (hasOverrideLabel && !justifMatch) {
              core.setFailed(
                'override:ok-to-merge label present but Override-Justification (≥40 chars) line is missing or too short in PR body. Add a single line beginning "Override-Justification: " followed by ≥40 characters of rationale.',
              );
              return;
            }
            core.setOutput('override_active', 'false');
      - name: Verify all required deployment gates succeeded
        if: steps.override.outputs.override_active != 'true'
        env:
          NEEDS_RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "Needs results: $NEEDS_RESULTS"
          # Fail if any needed job did not succeed (failure, cancelled, or skipped).
          if echo "$NEEDS_RESULTS" | grep -qE '"result":[[:space:]]*"(failure|cancelled|skipped)"'; then
            echo "ERROR: One or more required deployment gates did not succeed."
            exit 1
          fi
          echo "All required deployment gates passed."
