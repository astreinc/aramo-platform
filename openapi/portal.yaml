openapi: 3.1.0
info:
  title: Aramo Portal API
  version: 0.0.0
  description: |
    The talent-facing Portal surface. M3 PR-9 populates the foundation
    slice: two read endpoints (profile, consent state) per Plan v1.5 §M3
    PR-9 and API Contracts v1.0 Phase 3. Refusal-filtered by design —
    additionalProperties: false on every schema, no R10-class fields
    (internal_reasoning, entrustability_tier_raw, override_*, recruiter_*).
    Future PRs populate the remaining 10 Phase 3 endpoints under F26/F27/
    F28/F29.
paths:
  # Portal P1 PR-2a — the OPEN-4 chain surface. The prior singleton
  # /v1/portal/profile + /v1/portal/consent are REMOVED (the placeholder-era
  # sub-passthrough); the portal session's `sub` (PortalUser.id) now resolves to
  # the portal user's records ACROSS tenants.
  /v1/portal/records:
    get:
      operationId: getPortalRecords
      summary: The authenticated portal user's records across tenants (engagement surface).
      description: |
        The OPEN-4 chain resolves the portal session's `sub` (PortalUser.id) to
        the portal user's live TalentRecords across every tenant that holds them
        (P-R5 engagement surface). Returns a closed envelope of per-record
        R10-filtered profiles. A portal user with no cluster / no live records
        gets an EMPTY list (200), never an error.
      responses:
        '200':
          description: The portal user's records (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalRecordsResponse'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
      security:
        - BearerAuth: []

  /v1/portal/records/{id}/profile:
    get:
      operationId: getPortalRecordProfile
      summary: One record's R10-filtered profile.
      description: |
        `id` must be reachable through the caller's OPEN-4 chain. An id not in the
        chain (or unknown, or malformed) is a UNIFORM 404 — no "exists but not
        yours" oracle.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The record's portal profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalProfile'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/portal/records/{id}/consent:
    get:
      operationId: getPortalRecordConsent
      summary: One record's consent state (all 5 scopes).
      description: |
        Consent state for a record reachable through the caller's chain, scoped to
        that record's tenant. An unreachable/unknown/malformed id is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The record's consent state, all 5 scopes.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/TalentConsentStateResponse'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

components:
  securitySchemes:
    # Duplicated byte-for-byte from openapi/common.yaml per locked invariant
    # 4 (duplicate-not-$ref — no cross-document $ref for securitySchemes).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # M3 PR-9 §4.5 — PortalProfile schema. R10-filtered by construction:
    # additionalProperties: false enforces the closed envelope; no field
    # name matches the verify-portal-refusal.ts forbidden list
    # (internal_reasoning, entrustability_tier_raw, override_*, recruiter_*).
    # The CI gate scans this schema on every build.
    PortalProfile:
      type: object
      additionalProperties: false
      required:
        - talent_id
        - tenant_id
        - tenant_status
        - source_channel
        - created_at
      properties:
        talent_id:
          type: string
          format: uuid
          description: The talent's own id (mirrors JWT sub).
        tenant_id:
          type: string
          format: uuid
          description: The tenant context (from JWT tenant_id claim).
        tenant_status:
          type: string
          description: |
            Per-tenant relationship status (closed vocabulary per Talent
            Record Spec §2.2).
        source_channel:
          type: string
          description: |
            How the talent entered this tenant. Closed vocabulary per
            Talent Record Spec §2.2:
            self_signup | recruiter_capture | referral | import.
        created_at:
          type: string
          format: date-time
          description: |
            When the talent's TalentRecord was created in this tenant.

    # Portal P1 PR-2a — the records-list envelope (closed). Each entry is the
    # R10-filtered PortalProfile; the array MAY be empty (a portal user with no
    # cluster / no live records). additionalProperties:false per the refusal gate.
    PortalRecordsResponse:
      type: object
      additionalProperties: false
      required:
        - records
      properties:
        records:
          type: array
          description: |
            The portal user's per-record R10-filtered profiles across tenants
            (possibly empty). Tenant counterparty NAMING is permitted by P-R5 but
            deferred; tenant_id (the counterparty id) carries no origin-secrecy
            concern here — a portal user's own engagements, not a verification origin.
          items:
            $ref: '#/components/schemas/PortalProfile'
