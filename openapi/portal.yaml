openapi: 3.1.0
info:
  title: Aramo Portal API
  version: 0.0.0
  description: |
    The talent-facing Portal surface. M3 PR-9 populates the foundation
    slice: two read endpoints (profile, consent state) per Plan v1.5 §M3
    PR-9 and API Contracts v1.0 Phase 3. Refusal-filtered by design —
    additionalProperties: false on every schema, no R10-class fields
    (internal_reasoning, entrustability_tier_raw, override_*, recruiter_*).
    Future PRs populate the remaining 10 Phase 3 endpoints under F26/F27/
    F28/F29.
paths:
  # Portal P1 PR-2a — the OPEN-4 chain surface. The prior singleton
  # /v1/portal/profile + /v1/portal/consent are REMOVED (the placeholder-era
  # sub-passthrough); the portal session's `sub` (PortalUser.id) now resolves to
  # the portal user's records ACROSS tenants.
  /v1/portal/records:
    get:
      operationId: getPortalRecords
      summary: The authenticated portal user's records across tenants (engagement surface).
      description: |
        The OPEN-4 chain resolves the portal session's `sub` (PortalUser.id) to
        the portal user's live TalentRecords across every tenant that holds them
        (P-R5 engagement surface). Returns a closed envelope of per-record
        R10-filtered profiles. A portal user with no cluster / no live records
        gets an EMPTY list (200), never an error.
      responses:
        '200':
          description: The portal user's records (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalRecordsResponse'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
      security:
        - BearerAuth: []

  /v1/portal/records/{id}/profile:
    get:
      operationId: getPortalRecordProfile
      summary: One record's R10-filtered profile.
      description: |
        `id` must be reachable through the caller's OPEN-4 chain. An id not in the
        chain (or unknown, or malformed) is a UNIFORM 404 — no "exists but not
        yours" oracle.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The record's portal profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalProfile'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/portal/records/{id}/consent:
    get:
      operationId: getPortalRecordConsent
      summary: One record's consent state (all 5 scopes).
      description: |
        Consent state for a record reachable through the caller's chain, scoped to
        that record's tenant. An unreachable/unknown/malformed id is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The record's consent state, all 5 scopes.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/TalentConsentStateResponse'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  # Portal P2 P2b — the EXACT versioned consent text (the D7 hash preimage) the
  # portal user must see before granting. Rendered server-side (the wall blocks
  # importing the renderer into portal-web); the UI displays the bytes verbatim.
  /v1/portal/records/{id}/consent/text:
    get:
      operationId: getPortalRecordConsentText
      summary: The current versioned consent text for each scope on a record.
      description: |
        Returns the current consent-text version and the rendered text for all 5
        scopes, named by the record's tenant. The grant flow displays the text
        for the scope being granted; the version is echoed back on grant.
        Unreachable/unknown/malformed id is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The current consent text per scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalConsentText'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  # Portal P2 P2b — the append-only consent history for the management UI. Reuses
  # the engagement-class ConsentHistoryResponse (5 closed event fields, no
  # actor/trust leak). Keyset-paginated (scope/limit/cursor optional).
  /v1/portal/records/{id}/consent/history:
    get:
      operationId: getPortalRecordConsentHistory
      summary: The append-only consent event history for a record.
      description: |
        A keyset-paginated page of consent ledger events (granted | revoked |
        expired) for a record reachable through the caller's chain, scoped to
        that record's tenant. Engagement-class fields only. Unreachable/unknown/
        malformed id is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: scope
          in: query
          required: false
          schema:
            $ref: 'common.yaml#/components/schemas/ConsentScope'
        - name: limit
          in: query
          required: false
          description: Page size, default 50, max 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: cursor
          in: query
          required: false
          description: Opaque keyset cursor from a prior page's next_cursor.
          schema:
            type: string
      responses:
        '200':
          description: A page of consent history events (possibly empty).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ConsentHistoryResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  # Portal P2 P2a — portal-actor consent grant/revoke. Engagement-class
  # (the recipient tenant is named); NOT trust-class. Membership through the
  # OPEN-4 chain first — an unreachable/unknown/malformed id is a UNIFORM 404.
  /v1/portal/records/{id}/consent/grant:
    post:
      operationId: grantPortalRecordConsent
      summary: Grant consent for one scope on a record the caller holds.
      description: |
        The portal user grants consent for a single scope on a record reachable
        through their chain. Records the D7 consent-evidence object (the hash of
        the rendered consent text). Term defaults to 12 months (read-derived).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalConsentGrantRequest'
      responses:
        '201':
          description: The consent grant was recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalConsentMutation'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/portal/records/{id}/consent/revoke:
    post:
      operationId: revokePortalRecordConsent
      summary: Revoke consent for one scope on a record the caller holds.
      description: |
        Immediate + idempotent (revoking a non-active grant is a no-op success).
        Records the D7 consent-evidence object. Unreachable/unknown/malformed id
        is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalConsentRevokeRequest'
      responses:
        '201':
          description: The consent revoke was recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalConsentMutation'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  # Portal P3a — talent verification view + dispute rights. The verification
  # view is the FIRST TRUST-CLASS surface: its schemas join TRUST_CLASS_SCHEMAS
  # (ci/scripts/verify-portal-refusal.ts) in this same commit. Talent-level
  # (aggregated across the OPEN-4 chain), NOT per-record.
  /v1/portal/verifications:
    get:
      operationId: getPortalVerifications
      summary: The caller's verifications across their chain (trust-class).
      description: |
        Aggregates the talent's verifications across every subject in their
        OPEN-4 chain, deduped by anchor identity, rendered as kind + status +
        dates ONLY — the "verified on Aramo" form. NO verifier, NO tenant
        attribution, NO strength/tier numbers. A caller with no cluster gets an
        EMPTY list (200).
      responses:
        '200':
          description: The caller's verification items (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalVerifications'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
      security:
        - BearerAuth: []

  /v1/portal/disputes:
    get:
      operationId: listPortalDisputes
      summary: The caller's disputes (cluster-scoped).
      description: |
        The talent's own disputes, newest-first. Cluster-scoped — never another
        caller's disputes. Empty list (200) for a caller with no disputes.
      responses:
        '200':
          description: The caller's disputes (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalDisputeList'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
      security:
        - BearerAuth: []
    post:
      operationId: openPortalDispute
      summary: Open a dispute against a verification-view item.
      description: |
        The talent disputes an item shown on their verification view,
        identified by its opaque item id (a server-minted surrogate — never a raw
        PK / PII). A free-text statement is captured. Fans out to N tenant-scoped
        work items server-side (never on the wire). One-open-per-item: a still-
        open dispute on the same item is returned unchanged. An item id not in
        the caller's current view is a UNIFORM 404.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalDisputeOpenRequest'
      responses:
        '201':
          description: The dispute was opened (or the existing open one returned).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalDisputeMutation'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/portal/disputes/{id}:
    get:
      operationId: getPortalDispute
      summary: One dispute the caller owns.
      description: |
        A dispute id not in the caller's cluster (or unknown/malformed) is a
        UNIFORM 404 — no reviewer/tenant/queue identities are ever revealed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The dispute detail (status + resolution note + statements).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalDisputeDetail'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/portal/disputes/{id}/respond:
    post:
      operationId: respondPortalDispute
      summary: Append a talent statement to an open dispute.
      description: |
        Appends a free-text statement while the dispute is non-terminal. Replaying
        the identical latest statement is an idempotent no-op. A closed dispute is
        422 PORTAL_DISPUTE_NOT_OPEN; an out-of-chain id is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalDisputeRespondRequest'
      responses:
        '200':
          description: The statement was appended (idempotent on identical replay).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalDisputeMutation'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/portal/disputes/{id}/withdraw:
    post:
      operationId: withdrawPortalDispute
      summary: Withdraw a dispute (terminal; idempotent).
      description: |
        The talent withdraws their dispute (terminal). Already-terminal is an
        idempotent no-op. An out-of-chain/unknown/malformed id is a UNIFORM 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The dispute is WITHDRAWN (idempotent if already terminal).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalDisputeMutation'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

components:
  securitySchemes:
    # Duplicated byte-for-byte from openapi/common.yaml per locked invariant
    # 4 (duplicate-not-$ref — no cross-document $ref for securitySchemes).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # M3 PR-9 §4.5 — PortalProfile schema. R10-filtered by construction:
    # additionalProperties: false enforces the closed envelope; no field
    # name matches the verify-portal-refusal.ts forbidden list
    # (internal_reasoning, entrustability_tier_raw, override_*, recruiter_*).
    # The CI gate scans this schema on every build.
    PortalProfile:
      type: object
      additionalProperties: false
      required:
        - talent_id
        - tenant_id
        - tenant_name
        - tenant_status
        - source_channel
        - created_at
      properties:
        talent_id:
          type: string
          format: uuid
          description: The talent's own id (mirrors JWT sub).
        tenant_id:
          type: string
          format: uuid
          description: The tenant context (from JWT tenant_id claim).
        tenant_name:
          # Portal P2 P2b — the engagement counterparty NAMED (P-R5; the
          # P1-deferred MAY is now MUST). The always-present workspace name;
          # null only if the tenant row vanished (defensive). 3.1 nullable idiom
          # (type array), NOT `nullable:true` (redocly struct rule).
          type: [string, 'null']
          description: |
            The human-readable name of the tenant that holds this record. null
            only if the tenant row is missing (defensive).
        tenant_status:
          type: string
          description: |
            Per-tenant relationship status (closed vocabulary per Talent
            Record Spec §2.2).
        source_channel:
          type: string
          description: |
            How the talent entered this tenant. Closed vocabulary per
            Talent Record Spec §2.2:
            self_signup | recruiter_capture | referral | import.
        created_at:
          type: string
          format: date-time
          description: |
            When the talent's TalentRecord was created in this tenant.

    # Portal P1 PR-2a — the records-list envelope (closed). Each entry is the
    # R10-filtered PortalProfile; the array MAY be empty (a portal user with no
    # cluster / no live records). additionalProperties:false per the refusal gate.
    PortalRecordsResponse:
      type: object
      additionalProperties: false
      required:
        - records
      properties:
        records:
          type: array
          description: |
            The portal user's per-record R10-filtered profiles across tenants
            (possibly empty). Tenant counterparty NAMING is permitted by P-R5 but
            deferred; tenant_id (the counterparty id) carries no origin-secrecy
            concern here — a portal user's own engagements, not a verification origin.
          items:
            $ref: '#/components/schemas/PortalProfile'

    # Portal P2 P2a — portal-actor consent mutation schemas (closed). Declared
    # LOCALLY (not cross-$ref'd) so verify-portal-refusal.ts walks them. ENGAGEMENT-
    # class — NOT in TRUST_CLASS_SCHEMAS (a consent flow names its recipient tenant,
    # ruling 1). The record id is a path param resolved through the chain, never a
    # body field (no "who" oracle); the actor + term are server-derived.
    PortalConsentGrantRequest:
      type: object
      additionalProperties: false
      required:
        - scope
      properties:
        scope:
          $ref: 'common.yaml#/components/schemas/ConsentScope'
        consent_text_version:
          type: string
          description: |
            The consent-text version the portal user saw (the D7 hash preimage).
            Optional — defaults to the current version server-side.

    PortalConsentRevokeRequest:
      type: object
      additionalProperties: false
      required:
        - scope
      properties:
        scope:
          $ref: 'common.yaml#/components/schemas/ConsentScope'
        consent_text_version:
          type: string

    PortalConsentMutation:
      type: object
      additionalProperties: false
      required:
        - scope
        - action
        - occurred_at
        - expires_at
      properties:
        scope:
          $ref: 'common.yaml#/components/schemas/ConsentScope'
        action:
          type: string
          enum:
            - granted
            - revoked
        occurred_at:
          type: string
          format: date-time
        expires_at:
          # OpenAPI 3.1 nullable idiom (type array), matching ats.yaml:1702 —
          # `nullable: true` is a 3.0 keyword the 3.1 struct rule rejects.
          type: [string, 'null']
          format: date-time
          description: |
            The grant's 12-month term expiry (read-derived). null on revoke.

    # Portal P2 P2b — the versioned consent text per scope (closed, engagement-
    # class). Declared LOCALLY so verify-portal-refusal.ts walks it. `text` names
    # the recipient by tenant_id (the canonical legal clause); no R10/trust field.
    # NOT in TRUST_CLASS_SCHEMAS.
    PortalConsentText:
      type: object
      additionalProperties: false
      required:
        - version
        - texts
      properties:
        version:
          type: string
          description: |
            The current consent-text version shown to the portal user; echoed
            back on grant (the version whose hash the ledger records).
        texts:
          type: array
          description: One rendered consent-text entry per scope (all 5).
          items:
            $ref: '#/components/schemas/PortalConsentTextEntry'

    PortalConsentTextEntry:
      type: object
      additionalProperties: false
      required:
        - scope
        - text
      properties:
        scope:
          $ref: 'common.yaml#/components/schemas/ConsentScope'
        text:
          type: string
          description: The exact rendered consent text for this scope.

    # ── Portal P3a — verification view + dispute schemas ──
    # The verification-view schemas are the trust-class wall's FIRST live members
    # (registered in ci/scripts/verify-portal-refusal.ts THIS commit). They carry
    # NO tenant/verifier/number field — the origin-secrecy JOIN is structurally
    # impossible. The dispute response schemas are armed the same way.
    PortalVerifications:
      type: object
      additionalProperties: false
      required:
        - verifications
      properties:
        verifications:
          type: array
          description: The caller's verification items (possibly empty).
          items:
            $ref: '#/components/schemas/PortalVerificationItem'

    PortalVerificationItem:
      type: object
      additionalProperties: false
      required:
        - item_id
        - kind
        - status
        - verified_at
        - first_seen_at
      properties:
        item_id:
          type: string
          description: |
            The opaque, per-talent item surrogate (a server-minted HMAC digest,
            never a raw PK / PII). Submitted back to open a dispute.
        kind:
          type: string
          description: The verification kind (e.g. EMAIL | PHONE | PROFILE_URL).
        status:
          type: string
          enum:
            - CONFIRMED
            - PENDING
            - NONE
          description: The verification status. No tier/strength/number.
        verified_at:
          type: [string, 'null']
          format: date-time
        first_seen_at:
          type: [string, 'null']
          format: date-time

    PortalDisputeOpenRequest:
      type: object
      additionalProperties: false
      required:
        - item_id
        - statement
      properties:
        item_id:
          type: string
          description: The opaque verification-view item id (64-char hex).
        statement:
          type: string
          minLength: 1
          maxLength: 4000
          description: The talent's free-text statement (no reason taxonomy).

    PortalDisputeRespondRequest:
      type: object
      additionalProperties: false
      required:
        - statement
      properties:
        statement:
          type: string
          minLength: 1
          maxLength: 4000

    PortalDisputeMutation:
      type: object
      additionalProperties: false
      required:
        - dispute_id
        - status
        - opened_at
      properties:
        dispute_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - OPEN
            - UNDER_REVIEW
            - RESOLVED_CORRECTED
            - RESOLVED_UPHELD
            - WITHDRAWN
        opened_at:
          type: string
          format: date-time

    PortalDisputeStatement:
      type: object
      additionalProperties: false
      required:
        - statement
        - created_at
      properties:
        statement:
          type: string
        created_at:
          type: string
          format: date-time

    PortalDisputeDetail:
      type: object
      additionalProperties: false
      required:
        - dispute_id
        - status
        - opened_at
        - resolution_note
        - statements
      properties:
        dispute_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - OPEN
            - UNDER_REVIEW
            - RESOLVED_CORRECTED
            - RESOLVED_UPHELD
            - WITHDRAWN
        opened_at:
          type: string
          format: date-time
        resolution_note:
          type: [string, 'null']
          description: Plain-language resolution note, set on close (P3b). null while open.
        statements:
          type: array
          items:
            $ref: '#/components/schemas/PortalDisputeStatement'

    PortalDisputeList:
      type: object
      additionalProperties: false
      required:
        - disputes
      properties:
        disputes:
          type: array
          items:
            $ref: '#/components/schemas/PortalDisputeMutation'
