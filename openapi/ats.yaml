openapi: 3.1.0
info:
  title: Aramo ATS API
  version: 0.0.0
  description: |
    The recruiter-facing ATS surface. M3 PR-8 populates the first operation
    — the match-list read endpoint — per Plan v1.5 §M3 and the locked
    Match-List Summary-only rule (API Contracts L586-588). Future ATS PRs
    populate additional operations per API Contracts v1.0 Phase 2.
paths:
  /v1/submittals:
    post:
      operationId: createSubmittal
      summary: Create a submittal in `draft` state (M4 PR-3 / F33).
      description: |
        Builds the immutable TalentJobEvidencePackage (PR-2's
        EvidenceRepository.buildPackage) and persists a workflow
        TalentSubmittalRecord in state='draft' referencing it. The
        examination_id is pinned at draft creation; the future
        submittal-confirm endpoint (F34) verifies the pin and enforces
        the three recruiter attestations.

        Refusal codes (closed list at PR-3):
          - 422 SUBMITTAL_STRETCH_BLOCKED — examination tier is STRETCH.
          - 404 NOT_FOUND — examination missing / archived / cross-tenant.
          - 400 VALIDATION_ERROR — request body or path violates
            invariants (UUIDs, non-empty required fields).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key, different
            request body.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.

        Worth Considering submittals MAY include `justification` and
        `failed_criterion_acknowledgments`. PR-3 persists them verbatim
        without enforcement; F34's confirm endpoint enforces non-empty
        for Worth Considering tier and returns 422 JUSTIFICATION_REQUIRED
        on miss.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/CreateSubmittalRequest'
      responses:
        '201':
          description: Submittal created in `draft` state.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/CreateSubmittalResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/confirm:
    post:
      operationId: confirmSubmittal
      summary: Confirm a draft submittal (M4 PR-4 / F34).
      description: |
        Transitions a TalentSubmittalRecord from `draft` to `submitted`
        and stamps `confirmed_at`. Recruiter must affirm all three
        attestations (talent_evidence_reviewed, constraints_reviewed,
        submittal_risk_acknowledged) and the pinned examination must
        still be the latest active snapshot for the (tenant, talent,
        job) triple.

        Refusal codes (closed list at PR-4):
          - 422 ATTESTATION_MISSING — any of the three recruiter
            attestations is not literally true.
          - 422 SUBMITTAL_STRETCH_BLOCKED — pinned examination tier is
            STRETCH (re-check of PR-2's create-time gate).
          - 422 JUSTIFICATION_REQUIRED — Worth Considering submittal with
            missing/empty `justification` or zero
            `failed_criterion_acknowledgments` entries.
          - 409 EXAMINATION_PINNED_OUTDATED — pinned examination row is
            missing, no longer active, or no longer the latest snapshot
            for the (tenant, talent, job) triple.
          - 409 SUBMITTAL_ALREADY_CONFIRMED — submittal is already in
            state='submitted'.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key, different
            request body.
          - 404 NOT_FOUND — submittal_id not found for the JWT's tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — request body fails schema validation,
            submittal_id is not a UUID, or Idempotency-Key is missing /
            malformed.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/ConfirmSubmittalRequest'
      responses:
        '200':
          description: Submittal confirmed; state transitioned to `submitted`.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ConfirmSubmittalResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          $ref: 'common.yaml#/components/responses/Conflict'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/jobs/{job_id}/matches:
    get:
      operationId: listJobMatches
      summary: Returns the ranked match list for a job (Summary-only).
      description: |
        Returns the ranked Live List for the named active requisition as
        TalentJobExaminationSummary[] (NEVER Full — API Contracts L586-588).
        Empty data[] is returned (200, not 404) when no active requisition
        exists for the (tenant_id, job_id) pair; tenant mismatch is treated
        the same way (recovery-from-routing-bug security posture, not an
        error path).
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
          description: |
            Page size. Repository default 50, hard cap 200. Values outside
            [1, 200] are rejected with 400 INVALID_REQUEST by the
            controller; in-range values pass through to the repository's
            clamp.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque cursor returned in a prior response's pagination.next_cursor.
            Consumers MUST NOT decode it.
      responses:
        '200':
          description: Ranked match list of TalentJobExaminationSummary items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchListResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
      security:
        - BearerAuth: []

components:
  securitySchemes:
    # Duplicated byte-for-byte from openapi/common.yaml per locked invariant
    # 4 (duplicate-not-$ref — no cross-document $ref for securitySchemes).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # M3 PR-8 §4.4 — match-list response envelope. The endpoint emits
    # TalentJobExaminationSummary items only (Full is NOT referenced from
    # this endpoint — see directive §4.4). additionalProperties: false plus
    # Summary's additionalProperties: false in common.yaml jointly enforce
    # the Summary-only contract that the Pact strict jsonBody test asserts.
    MatchListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: 'common.yaml#/components/schemas/TalentJobExaminationSummary'
        pagination:
          $ref: 'common.yaml#/components/schemas/PaginationEnvelope'
