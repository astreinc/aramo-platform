openapi: 3.1.0
info:
  title: Aramo ATS API
  version: 0.0.0
  description: |
    The recruiter-facing ATS surface. M3 PR-8 populates the first operation
    — the match-list read endpoint — per Plan v1.5 §M3 and the locked
    Match-List Summary-only rule (API Contracts L586-588). Future ATS PRs
    populate additional operations per API Contracts v1.0 Phase 2.
paths:
  /v1/submittals:
    post:
      operationId: createSubmittal
      summary: Create a submittal in `created` state (M4 PR-3 / F33; M5 PR-8b2 rename).
      description: |
        Builds the immutable TalentJobEvidencePackage (PR-2's
        EvidenceRepository.buildPackage) and persists a workflow
        TalentSubmittalRecord in state='created' referencing it. The
        examination_id is pinned at create-time; the submittal-confirm
        endpoint (F34) verifies the pin and enforces the three
        recruiter attestations.

        M5 PR-8b2 rename: M4 'draft' state renamed to canonical
        'created' (lifecycle start state per Group 2 §2.3b Loop 5).

        Refusal codes (closed list at PR-3):
          - 422 SUBMITTAL_STRETCH_BLOCKED — examination tier is STRETCH.
          - 404 NOT_FOUND — examination missing / archived / cross-tenant.
          - 400 VALIDATION_ERROR — request body or path violates
            invariants (UUIDs, non-empty required fields).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key, different
            request body.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.

        Worth Considering submittals MAY include `justification` and
        `failed_criterion_acknowledgments`. PR-3 persists them verbatim
        without enforcement; F34's confirm endpoint enforces non-empty
        for Worth Considering tier and returns 422 JUSTIFICATION_REQUIRED
        on miss.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/CreateSubmittalRequest'
      responses:
        '201':
          description: Submittal created in `created` state.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/CreateSubmittalResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/confirm:
    post:
      operationId: confirmSubmittal
      summary: Confirm submittal entry; transition created -> handoff_draft (M4 PR-4 / F34; M5 PR-8b2 rename).
      description: |
        Transitions a TalentSubmittalRecord from `created` to
        `handoff_draft`. Recruiter must affirm all three attestations
        (talent_evidence_reviewed, constraints_reviewed,
        submittal_risk_acknowledged) and the pinned examination must
        still be the latest active snapshot for the (tenant, talent,
        job) triple. URL preserved per Q5 PATTERN-b; semantic update
        per Ruling 12.

        M5 PR-8b2 rename: M4's 'draft -> submitted with confirmed_at
        stamp' semantic becomes canonical 'created -> handoff_draft'
        (no confirmed_at change here per Ruling 6 — confirmed_at moves
        to the ready_for_review -> submitted_to_ats transition via
        the new /submit-to-ats endpoint).

        Refusal codes (closed list at PR-4 + M5 PR-8b2):
          - 422 ATTESTATION_MISSING — any of the three recruiter
            attestations is not literally true.
          - 422 SUBMITTAL_STRETCH_BLOCKED — pinned examination tier is
            STRETCH (re-check of PR-2's create-time gate).
          - 422 JUSTIFICATION_REQUIRED — Worth Considering submittal with
            missing/empty `justification` or zero
            `failed_criterion_acknowledgments` entries.
          - 422 SUBMITTAL_STATE_INVALID — submittal is in a from-state
            other than `created` or `handoff_draft` (canTransition
            guard refusal).
          - 409 EXAMINATION_PINNED_OUTDATED — pinned examination row is
            missing, no longer active, or no longer the latest snapshot
            for the (tenant, talent, job) triple.
          - 409 SUBMITTAL_ALREADY_CONFIRMED — submittal is already in
            state='handoff_draft' (post-rename equivalent of M4 'submitted'
            confirm-target; preserves M4 client error vocabulary on
            double-call).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key, different
            request body.
          - 404 NOT_FOUND — submittal_id not found for the JWT's tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — request body fails schema validation,
            submittal_id is not a UUID, or Idempotency-Key is missing /
            malformed.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/ConfirmSubmittalRequest'
      responses:
        '200':
          description: Submittal confirmed; state transitioned to `handoff_draft`.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ConfirmSubmittalResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          $ref: 'common.yaml#/components/responses/Conflict'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/revoke:
    post:
      operationId: revokeSubmittal
      summary: Revoke a submittal (M4 PR-7; M5 PR-8b2 Q3 sibling-revoke expansion).
      description: |
        Transitions a TalentSubmittalRecord from any non-terminal
        state (`created`, `handoff_draft`, `ready_for_review`,
        `submitted_to_ats`) to `revoked` and stamps `revoked_at` /
        `revoked_by` / `revocation_justification` atomically. The
        response carries the LOCKED invariant
        `evidence_package_mutated: false` — every successful revoke
        affirms that the referenced TalentJobEvidencePackage row is
        byte-identical to its pre-revoke snapshot (state-isolation
        contract, mirroring the override-create endpoint's
        `examination_mutated: false` invariant from M4 PR-5).

        M5 PR-8b2 expansion per Q3 + Ruling 5: revocable from any
        non-terminal state (M4 was only `submitted -> revoked`). NOT
        revocable from `confirmed` (terminal — ATS confirmation closes
        the workflow) or `revoked` (already terminal).

        Refusal codes (closed list at PR-7 + M5 PR-8b2):
          - 422 REVOKE_NOT_ALLOWED — submittal is in a terminal state
            (`confirmed` or `revoked`); the response details carry
            `current_state`.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key,
            different request body.
          - 404 NOT_FOUND — submittal_id not found for the JWT's
            tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — request body fails schema
            validation, submittal_id is not a UUID, or
            Idempotency-Key is missing / malformed.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/RevokeSubmittalRequest'
      responses:
        '200':
          description: Submittal revoked; state transitioned to `revoked`.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/RevokeSubmittalResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/mark-ready:
    post:
      operationId: markReady
      summary: Mark submittal ready for review (M5 PR-8b2; handoff_draft -> ready_for_review).
      description: |
        Fires the canonical mainline transition handoff_draft ->
        ready_for_review (M5 PR-8b2 F37 closure; transition 2 of 4).
        9-step idempotency flow mirrors M4 /confirm + /revoke pattern
        (per Q5 PATTERN-b distinct new endpoints). Per Ruling 13
        request body is empty.

        Response wraps { submittal, event } per Ruling 14 — the
        updated TalentSubmittalRecord alongside the freshly appended
        TalentSubmittalEvent (state_transition; payload
        { from_state, to_state }).

        Refusal codes (closed list):
          - 422 SUBMITTAL_STATE_INVALID — submittal is not in
            state='handoff_draft' (canTransition guard refusal); the
            response details carry `from_state` + `to_state`.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key,
            different request body.
          - 404 NOT_FOUND — submittal_id not found for the JWT's
            tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — submittal_id is not a UUID, or
            Idempotency-Key is missing / malformed.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/MarkReadyRequest'
      responses:
        '200':
          description: Submittal marked ready; state transitioned to `ready_for_review`.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/MarkReadyResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/submit-to-ats:
    post:
      operationId: submitToAts
      summary: Submit to ATS (M5 PR-8b2; ready_for_review -> submitted_to_ats; populates confirmed_at).
      description: |
        Fires the canonical mainline transition ready_for_review ->
        submitted_to_ats (M5 PR-8b2 F37 closure; transition 3 of 4).
        Per Ruling 6 this transition populates `confirmed_at`
        NULL -> non-NULL (preserves M4 confirmed_at column semantic
        post-rename; M4's 'draft -> submitted with confirmed_at'
        becomes canonical 'ready_for_review -> submitted_to_ats with
        confirmed_at'). Per Ruling 13 request body is empty.

        Response wraps { submittal, event } per Ruling 14.

        Refusal codes (closed list):
          - 422 SUBMITTAL_STATE_INVALID — submittal is not in
            state='ready_for_review' (canTransition guard refusal).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key,
            different request body.
          - 404 NOT_FOUND — submittal_id not found for the JWT's
            tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — submittal_id is not a UUID, or
            Idempotency-Key is missing / malformed.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/SubmitToAtsRequest'
      responses:
        '200':
          description: Submittal submitted to ATS; state transitioned to `submitted_to_ats`; confirmed_at populated.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/SubmitToAtsResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/confirm-ats:
    post:
      operationId: confirmAts
      summary: Confirm ATS submission (M5 PR-8b2; submitted_to_ats -> confirmed; lifecycle terminal).
      description: |
        Fires the canonical mainline transition submitted_to_ats ->
        confirmed (M5 PR-8b2 F37 closure; transition 4 of 4;
        lifecycle terminal). Per Ruling 5 `confirmed` is fully
        terminal -- not even sibling-revoke applies post-confirm.
        ATS external reference id on the request body is explicitly
        OUT-OF-SCOPE per directive §5 (deferred to future consumer
        PR). Per Ruling 13 request body is empty.

        Response wraps { submittal, event } per Ruling 14.

        Refusal codes (closed list):
          - 422 SUBMITTAL_STATE_INVALID — submittal is not in
            state='submitted_to_ats' (canTransition guard refusal).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key,
            different request body.
          - 404 NOT_FOUND — submittal_id not found for the JWT's
            tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — submittal_id is not a UUID, or
            Idempotency-Key is missing / malformed.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/ConfirmAtsRequest'
      responses:
        '200':
          description: Submittal confirmed by ATS; state transitioned to `confirmed`; lifecycle terminal.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ConfirmAtsResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}:
    get:
      operationId: getSubmittal
      summary: Get a TalentSubmittalRecord by id (M4 PR-6).
      description: |
        Tenant-scoped lookup via SubmittalRepository.findById. Returns the
        TalentSubmittalRecord for the JWT's tenant. Read-only; no
        Idempotency-Key required (Ruling 8 — M3 PR-8 / M3 PR-9 GET
        precedent).

        Refusal codes (closed list at PR-6):
          - 404 NOT_FOUND — submittal_id not found for the JWT's tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — submittal_id is not a UUID.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: TalentSubmittalRecord for the JWT's tenant.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/TalentSubmittalRecord'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/submittals/{submittal_id}/evidence-package:
    get:
      operationId: getEvidencePackage
      summary: Get the linked TalentJobEvidencePackage for a submittal (M4 PR-6).
      description: |
        Tenant-scoped chain lookup: load the submittal (verifying tenancy
        on SubmittalRepository.findById), then load the linked
        TalentJobEvidencePackage via EvidenceRepository.findById on
        submittal.evidence_package_id (tenancy re-asserted). Read-only;
        no Idempotency-Key required (Ruling 8). No state-isolation
        invariant (no mutation possible).

        Refusal codes (closed list at PR-6):
          - 404 NOT_FOUND — submittal not found for the JWT's tenant, OR
            evidence-package not found at submittal.evidence_package_id
            (chain-break; defensive — the cross-schema invariant
            (Architecture §7.3) ensures live package rows).
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — submittal_id is not a UUID.
      parameters:
        - name: submittal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: TalentJobEvidencePackageView linked to the submittal.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/TalentJobEvidencePackageView'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/examinations/{examination_id}/overrides:
    post:
      operationId: createExaminationOverride
      summary: Record a recruiter override on an examination (M4 PR-5).
      description: |
        Records a recruiter-authored override (tier, risk_flag, gap, or
        constraint_check) against an active TalentJobExamination WITHOUT
        mutating the immutable examination row. The response carries the
        locked invariant `examination_mutated: false` — every successful
        create affirms that the referenced examination row is byte-
        identical to its pre-create snapshot (Group 2 §2.4-§2.5 write-
        isolation contract).

        Refusal codes:
          - 404 NOT_FOUND — examination missing, archived/cold_storage,
            or cross-tenant.
          - 422 OVERRIDE_INVALID — semantic refusal of invalid override
            payload (registered at PR-5; reserved for future enforcement).
          - 400 VALIDATION_ERROR — request body fails schema validation,
            examination_id is not a UUID, or Idempotency-Key is missing /
            malformed.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key with a
            different request body.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
      parameters:
        - name: examination_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/CreateOverrideRequest'
      responses:
        '201':
          description: Override recorded; examination row unchanged.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/CreateOverrideResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  # =========================================================================
  # M5 PR-4 — Engagement HTTP surface (Charter v1.2 §4.3 row 4).
  #
  # Four endpoints exposing the M5 PR-1/2/3 engagement substrate at the
  # ATS-thin recruiter-facing surface:
  #   POST /v1/engagements                   — create (Ruling 4 + Ruling 9)
  #   POST /v1/engagements/{id}/transitions  — state transition (Ruling 10)
  #   GET  /v1/engagements/{id}              — read engagement (Ruling 5)
  #   GET  /v1/engagements/{id}/events       — read event log (Ruling 5)
  #
  # All endpoints recruiter-only (Ruling 8); non-recruiter consumers 403'd
  # with INSUFFICIENT_PERMISSIONS. POST endpoints require Idempotency-Key
  # header (M4 PR-3 precedent).
  # =========================================================================

  /v1/engagements:
    post:
      operationId: createEngagement
      summary: Create a new TalentJobEngagement (M5 PR-4).
      description: |
        Creates a new TalentJobEngagement row in initial state
        `surfaced` (Group 2 §2.3b Loop 1) and appends the initial
        state_transition event row atomically via prisma.$transaction.

        Three cross-schema validators run fail-fast BEFORE the write
        transaction opens (M5 PR-3 Amendment v1.1 §2, three substrate-
        derived patterns):
          - Pattern C (Talent): TalentRepository.findOverlayByTenant;
            overlay absence → 422 ENGAGEMENT_REFERENCE_NOT_FOUND.
          - Pattern A (Requisition): findRequisitionById + tenant
            check; null/mismatch → 422 ENGAGEMENT_REFERENCE_NOT_FOUND.
          - Pattern B (Examination, nullable): findById + tenant check;
            null/mismatch → 422 ENGAGEMENT_REFERENCE_NOT_FOUND.

        Response shape: { engagement } only per Ruling 9. The initial
        event row is accessible via GET /v1/engagements/{id}/events.

        Refusal codes:
          - 422 ENGAGEMENT_REFERENCE_NOT_FOUND — cross-schema validator.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same key, different body.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — DTO shape / Idempotency-Key issues.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/CreateEngagementRequest'
      responses:
        '201':
          description: Engagement created in initial state `surfaced`.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/CreateEngagementResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/engagements/{engagement_id}/transitions:
    post:
      operationId: transitionEngagement
      summary: Transition an engagement to a new state (M5 PR-4).
      description: |
        Transitions an existing engagement's state column via the
        repository's transitionState method. Atomic prisma.$transaction
        pairs the engagement.update with a state_transition event row
        append per M5 PR-3 substrate.

        Pre-write guards (in order):
          1. consumer_type === 'recruiter' (403 INSUFFICIENT_PERMISSIONS).
          2. Idempotency-Key required + UUID-shaped.
          3. engagement_id path param UUID validation.
          4. Read current via findByTenantAndId (404 NOT_FOUND if null).
          5. canTransition guard (422 ENGAGEMENT_STATE_INVALID if illegal).

        Column-scoped DB trigger (PR-1 substrate) is defense-in-depth.

        Response shape: { engagement } only per Ruling 9 + Ruling 11
        (NO state-isolation literal field).

        Refusal codes:
          - 422 ENGAGEMENT_STATE_INVALID — illegal transition (satisfies
            Plan v1.5 §M5 Track B item 1).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same key, different body.
          - 404 NOT_FOUND — engagement_id not visible in tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — DTO shape / Idempotency-Key issues.
      parameters:
        - name: engagement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/TransitionEngagementRequest'
      responses:
        '200':
          description: Engagement state transitioned; event row appended.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/TransitionEngagementResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/engagements/{engagement_id}/outreach:
    post:
      operationId: sendOutreach
      summary: Send an AI-drafted outreach for an engagement (M5 PR-6).
      description: |
        Generates an AI-drafted outreach via libs/ai-draft (Anthropic
        adapter at M5 PR-5), invokes the injected DeliveryProvider
        (SendStubDeliveryProvider at PR-6 — no real network I/O), and
        atomically transitions the engagement from 'engaged' to
        'awaiting_response' with a paired `outreach_sent` event row +
        `state_transition` event row.

        Side-effect ordering (M5 PR-6 §4.1 + Rulings 1 + 11): AI draft
        + delivery happen BEFORE the DB write. If either fails, the
        engagement state column + event log are unchanged (no partial-
        state observability). The repository's $transaction guarantees
        the 3 writes commit together OR none commit.

        Pre-write guards (in order):
          1. consumer_type === 'recruiter' (403 INSUFFICIENT_PERMISSIONS).
          2. Idempotency-Key required + UUID-shaped.
          3. engagement_id path param UUID validation.
          4. Body hash for replay-vs-conflict.
          5. Idempotency lookup (replay short-circuit).
          6. AiDraftService.generateDraft (with error-code remap).
          7. DeliveryProvider.deliver (SendStub pass-through at PR-6).
          8. EngagementRepository.sendOutreach atomic transaction.

        AI error remapping (Ruling 6):
          - kind ∈ {provider_unavailable, provider_internal_error}
            → 502 AI_PROVIDER_UNAVAILABLE.
          - kind === 'provider_rate_limited' → 429 AI_RATE_LIMITED.
          - any other kind → pass-through (e.g. provider_auth_failed
            remains 500 INTERNAL_ERROR).

        Refusal codes:
          - 422 ENGAGEMENT_STATE_INVALID — engagement not in 'engaged'
            state.
          - 502 AI_PROVIDER_UNAVAILABLE — LLM transport / vendor-internal
            failure.
          - 429 AI_RATE_LIMITED — LLM rate-limit response.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same key, different body.
          - 404 NOT_FOUND — engagement_id not visible in tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — DTO shape / Idempotency-Key issues.
      parameters:
        - name: engagement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/OutreachSendRequest'
      responses:
        '200':
          description: |
            Outreach drafted + delivered (stub) + engagement transitioned
            to 'awaiting_response'.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/OutreachSendResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
        '429':
          description: AI provider rate-limit (AI_RATE_LIMITED).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '502':
          description: AI provider unavailable (AI_PROVIDER_UNAVAILABLE).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /v1/engagements/{engagement_id}/response:
    post:
      operationId: recordResponse
      summary: Record a talent response to a prior outreach (M5 PR-7).
      description: |
        Recruiter records that a talent responded to a prior
        outreach. Compressed-scope mirror of POST .../outreach: no AI
        consumption, no delivery side-effect, no new error codes.

        Atomic 3-write transaction (EngagementRepository.recordResponse):
          1. engagement.update(state = 'responded').
          2. talentEngagementEvent.create(event_type='response_received',
             event_payload=EngagementResponseReceivedPayload).
          3. talentEngagementEvent.create(event_type='state_transition',
             event_payload={from_state, to_state}).

        Pre-write guards (in order):
          1. consumer_type === 'recruiter' (403 INSUFFICIENT_PERMISSIONS).
          2. Idempotency-Key required + UUID-shaped.
          3. engagement_id path param UUID validation.
          4. Body hash for replay-vs-conflict.
          5. Idempotency lookup (replay short-circuit).
          6. NOT_FOUND guard (findByTenantAndId).
          7. Cross-event reference validation (Ruling 4): the
             outreach_event_ref_id MUST resolve to an event in the same
             tenant + same engagement + event_type='outreach_sent'.
             Any of (null lookup / cross-engagement / cross-tenant /
             wrong-event-type) → 422 ENGAGEMENT_REFERENCE_NOT_FOUND.
          8. canTransition(current.state, 'responded') — natural-key
             dedup atop the standard Idempotency-Key replay path.

        Refusal codes (closed list):
          - 422 ENGAGEMENT_STATE_INVALID — engagement not in
            'awaiting_response' state (covers engagement already in
            'responded' state — natural-key dedup).
          - 422 ENGAGEMENT_REFERENCE_NOT_FOUND — outreach_event_ref_id
            doesn't resolve to a valid outreach_sent event in tenant +
            engagement.
          - 409 IDEMPOTENCY_KEY_CONFLICT — same key, different body.
          - 404 NOT_FOUND — engagement_id not visible in tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — DTO shape / Idempotency-Key issues.
      parameters:
        - name: engagement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/RecordResponseRequest'
      responses:
        '200':
          description: |
            Response recorded; engagement transitioned to 'responded'.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/RecordResponseResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/engagements/{engagement_id}/conversation:
    post:
      operationId: recordConversationStarted
      summary: Record that an in-bound conversation has begun (M5 PR-8a).
      description: |
        Recruiter records that an in-bound conversation with the talent
        has begun following a prior response. Compressed-scope mirror
        of POST .../response: no AI consumption, no delivery
        side-effect, no new error codes, and — unlike PR-7 — NO
        cross-event reference validation (Ruling 3: workflow invariant
        is sufficiently enforced by canTransition, the prior
        response_received event is implicit).

        Atomic 3-write transaction
        (EngagementRepository.recordConversationStarted):
          1. engagement.update(state = 'in_conversation').
          2. talentEngagementEvent.create(event_type='conversation_started',
             event_payload=EngagementConversationStartedPayload).
          3. talentEngagementEvent.create(event_type='state_transition',
             event_payload={from_state, to_state}).

        Pre-write guards (in order):
          1. consumer_type === 'recruiter' (403 INSUFFICIENT_PERMISSIONS).
          2. Idempotency-Key required + UUID-shaped.
          3. engagement_id path param UUID validation.
          4. Body hash for replay-vs-conflict.
          5. Idempotency lookup (replay short-circuit).
          6. NOT_FOUND guard (findByTenantAndId).
          7. canTransition(current.state, 'in_conversation') — natural-
             key dedup atop the standard Idempotency-Key replay path
             (engagement already in 'in_conversation' refuses with
             ENGAGEMENT_STATE_INVALID even with a fresh key).

        Refusal codes (closed list):
          - 422 ENGAGEMENT_STATE_INVALID — engagement not in
            'responded' state (covers engagement already in
            'in_conversation' state — natural-key dedup — and
            engagements in 'engaged' / 'awaiting_response' / earlier
            states).
          - 409 IDEMPOTENCY_KEY_CONFLICT — same key, different body.
          - 404 NOT_FOUND — engagement_id not visible in tenant.
          - 403 INSUFFICIENT_PERMISSIONS — non-recruiter consumer.
          - 400 VALIDATION_ERROR — DTO shape / Idempotency-Key issues.
      parameters:
        - name: engagement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: |
            UUID idempotency key. Same key + same body returns the prior
            response; same key + different body returns 409
            IDEMPOTENCY_KEY_CONFLICT. Missing or non-UUID returns 400
            VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common.yaml#/components/schemas/RecordConversationStartedRequest'
      responses:
        '200':
          description: |
            Conversation recorded; engagement transitioned to
            'in_conversation'.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/RecordConversationStartedResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '409':
          description: Idempotency-Key collision (same key, different body).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/ErrorResponse'
        '422':
          $ref: 'common.yaml#/components/responses/UnprocessableEntity'
      security:
        - BearerAuth: []

  /v1/engagements/{engagement_id}:
    get:
      operationId: getEngagement
      summary: Read a TalentJobEngagement by id (M5 PR-4).
      description: |
        Tenant-scoped read of a single engagement via
        EngagementRepository.findByTenantAndId. Cross-tenant or
        non-existent → 404 NOT_FOUND (Architecture §7.2 — cross-tenant
        reads surface as invisibility, not 403).

        No Idempotency-Key handling per Ruling 5 (GET routes are
        side-effect-free).
      parameters:
        - name: engagement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Engagement view.
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/TalentJobEngagementView'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/engagements/{engagement_id}/events:
    get:
      operationId: getEngagementEvents
      summary: List event-log entries for an engagement (M5 PR-4).
      description: |
        Tenant-scoped read of the chronological event log for an
        engagement via EngagementEventRepository
        .findByTenantAndEngagementId. Order: ASC by created_at.

        Includes a parent-engagement existence pre-check (404 NOT_FOUND
        if the engagement itself is not visible in tenant) to avoid the
        information-leak path where a non-existent engagement_id would
        return an empty events array (same response shape as a
        newly-created engagement with no events yet).
      parameters:
        - name: engagement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chronological event log (may be empty).
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/EngagementListEventsResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
      security:
        - BearerAuth: []

  /v1/jobs/{job_id}/matches:
    get:
      operationId: listJobMatches
      summary: Returns the ranked match list for a job (Summary-only).
      description: |
        Returns the ranked Live List for the named active requisition as
        TalentJobExaminationSummary[] (NEVER Full — API Contracts L586-588).
        Empty data[] is returned (200, not 404) when no active requisition
        exists for the (tenant_id, job_id) pair; tenant mismatch is treated
        the same way (recovery-from-routing-bug security posture, not an
        error path).
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
          description: |
            Page size. Repository default 50, hard cap 200. Values outside
            [1, 200] are rejected with 400 INVALID_REQUEST by the
            controller; in-range values pass through to the repository's
            clamp.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque cursor returned in a prior response's pagination.next_cursor.
            Consumers MUST NOT decode it.
      responses:
        '200':
          description: Ranked match list of TalentJobExaminationSummary items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchListResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: 'common.yaml#/components/responses/Forbidden'
      security:
        - BearerAuth: []

components:
  securitySchemes:
    # Duplicated byte-for-byte from openapi/common.yaml per locked invariant
    # 4 (duplicate-not-$ref — no cross-document $ref for securitySchemes).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # M3 PR-8 §4.4 — match-list response envelope. The endpoint emits
    # TalentJobExaminationSummary items only (Full is NOT referenced from
    # this endpoint — see directive §4.4). additionalProperties: false plus
    # Summary's additionalProperties: false in common.yaml jointly enforce
    # the Summary-only contract that the Pact strict jsonBody test asserts.
    MatchListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: 'common.yaml#/components/schemas/TalentJobExaminationSummary'
        pagination:
          $ref: 'common.yaml#/components/schemas/PaginationEnvelope'
