# Aramo — Single-Box Directive 1: the runnable PROD stack.
#
# The D5 dev stack + a production front-door, composed so it comes up with one
# command and is provable LOCALLY before the Lightsail box exists. ADDITIVE:
# this does NOT touch the D1 images/Dockerfiles, the D2 Terraform, or the D5
# dev compose (docker-compose.yml / docker-compose.images.yml all still work).
#
# Services:
#   caddy          the ONLY service publishing ports (80/443) — TLS + static +
#                  path routing. Self-contained image with the ats-web SPA baked
#                  in (deploy/caddy/Dockerfile).
#   api            apps/api — the D1 image, UNCHANGED (referenced, not rebuilt).
#   auth-service   apps/auth-service — the D1 image, UNCHANGED.
#   postgres       persisted named volume (the fresh-start DB survives restarts).
#   redis          BullMQ (real, not degraded).
# Postgres + Redis are container-INTERNAL — never published to the host/network.
#
# ── Run it (secrets stay in the SHELL, never in a compose-parsable file — the
#    real .env carries multi-line PEM keys compose's env_file parser can't read;
#    same proven pattern as docker-compose.images.yml) ────────────────────────
#
#   # 0) Build the D1 backend images + this front-door image (first time / on change):
#   docker build -f apps/api/Dockerfile          -t aramo/api:local          .
#   docker build -f apps/auth-service/Dockerfile -t aramo/auth-service:local .
#   docker build -f deploy/caddy/Dockerfile      -t aramo/caddy:local        .
#
#   # 1) Load the env contract into the shell, then bring the stack up:
#   set -a && source .env && set +a
#   docker compose --env-file /dev/null -f docker-compose.prod.yml up -d
#
#   # 2) Smoke THROUGH Caddy (local CA over https; -k trusts the local cert):
#   curl -ik https://localhost/.well-known/jwks.json   # auth-service → 200 JWKS
#   curl -ik https://localhost/v1/tenant/settings      # api          → 401 AUTH_REQUIRED
#   #   open https://localhost                          # ats-web SPA loads
#
#   docker compose --env-file /dev/null -f docker-compose.prod.yml down
#
# `--env-file /dev/null` stops compose parsing the multi-line .env for ${}
# interpolation. Bare-name entries under `environment:` are PASSED THROUGH by
# name from the sourced shell env (verbatim — multi-line-PEM-safe). DATABASE_URL
# / REDIS_URL are PINNED to the compose service names (the .env values point at
# localhost, unreachable from inside the container network); the DB credentials
# are interpolated from the same POSTGRES_* vars that configure the postgres
# service, so they cannot drift. See .env.prod.example for the full env surface.

services:
  caddy:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    image: aramo/caddy:local
    container_name: aramo-prod-caddy
    restart: unless-stopped
    environment:
      # TLS/domain parameterization (Caddyfile defaults to localhost/internal,
      # no on-demand, when unset — local just works; the box sets the wildcard
      # *.aramo.ai + an ACME email + on_demand for Subdomain-Identity A's
      # tenant-validated per-host certs). CADDY_ASK_URL is optional (Caddyfile
      # defaults it to the compose-internal api ask-endpoint). Bare-name
      # passthrough so the box can override via .env.
      - CADDY_SITE_ADDRESS
      - CADDY_TLS
      - CADDY_TLS_ONDEMAND
      - CADDY_ASK_URL
      # Dedicated-host address vars for the explicit site blocks. Without these
      # in the passthrough the container falls back to the Caddyfile *.localhost
      # defaults, so the prod hosts never bind. CADDY_ADMIN_ADDRESS (admin.aramo.ai)
      # was omitted when Inc-3 PR-3.3 shipped; Portal P1 PR-3 adds
      # CADDY_PORTAL_ADDRESS (candidate.aramo.ai) and closes the admin gap alongside.
      - CADDY_ADMIN_ADDRESS
      # D-CADDY-WILDCARD-SKIP-1 — the admin block's tls arg. Box sets
      # `force_automate` so admin.aramo.ai is eagerly issued despite the
      # *.aramo.ai wildcard-coverage skip; unset locally → `internal` CA. A var
      # absent from THIS passthrough never reaches the container and the fix is
      # inert (the D-AUTH-PLATFORM-HOSTS-1 defect class).
      - CADDY_ADMIN_TLS
      - CADDY_PORTAL_ADDRESS
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Persist issued certs + ACME state across restarts (on the box this
      # avoids re-requesting Let's Encrypt certs — and its rate limits — on
      # every reboot; pairs with the Directive-3 systemd unit).
      - aramo-prod-caddy-data:/data
      - aramo-prod-caddy-config:/config
    depends_on:
      - api
      - auth-service

  api:
    # D1 image, UNCHANGED — referenced, not rebuilt. Override ARAMO_API_IMAGE
    # to point at the ECR tag (D2) on the box; defaults to the local D1 tag.
    image: ${ARAMO_API_IMAGE:-aramo/api:local}
    container_name: aramo-prod-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      # host localhost → compose-network service names; creds from POSTGRES_*
      # (same source as the postgres service → cannot drift).
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aramo}:${POSTGRES_PASSWORD:-aramo}@postgres:5432/${POSTGRES_DB:-aramo}?schema=public
      - REDIS_URL=redis://redis:6379
      # pass-through by name from the sourced shell env (multi-line-safe):
      - AUTH_AUDIENCE
      - AUTH_PUBLIC_KEY
      - AUTH_COGNITO_TENANT_USER_POOL_ID
      - AUTH_COGNITO_ENDPOINT
      - S3_RESUME_BUCKET
      - S3_ENDPOINT
      - ARAMO_ENV
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      # transactional mailer (Email-S1): ses|stub + the fixed SES sender
      - MAILER_PROVIDER
      - SES_FROM_ADDRESS
      # DNS resolver for domain verification (Domain-Enforcement P2b): node|stub.
      # REQUIRED — loadDnsConfig fails LOUD if unset (api crash-loops). api-only;
      # auth-service does not load the DNS module.
      - DNS_PROVIDER
      # invite links (Invite-S2 / Pattern-2): accept-page + sign-in-page bases
      - INVITE_ACCEPT_URL
      - INVITE_SIGNIN_URL
      - ADDRESS_AUTOCOMPLETE_ENABLED
      - ADDRESS_AUTOCOMPLETE_PROVIDER
      - GOOGLE_PLACES_API_KEY
      - IMPORT_FAILURE_THRESHOLD_PCT
      # identity fingerprint pepper (Step 4b / ADR-0016): the platform secret
      # keying the cross-tenant email fingerprint, held SEPARATE from the DB.
      # REQUIRED — loadIdentityPepper fails LOUD if unset (api canonicalization
      # STOPS rather than mis-resolving with an unkeyed fingerprint). SHARED with
      # auth-service (Portal P1 eligibility fingerprint) — the value MUST match, so
      # this is the SINGLE SOURCE: the YAML anchor below is referenced by
      # auth-service (*identity_pepper) so the two passthroughs cannot drift.
      # Migrate to KMS/HSM later.
      - &identity_pepper ARAMO_IDENTITY_PEPPER
      # identity index admission policy (TR-2b B1 / Ruling D15): PORTABLE_ONLY |
      # ALL_ARRIVALS — the platform-global switch gating the aperture-1
      # fingerprint mint. REQUIRED — loadIdentityAdmissionPolicy fails LOUD on the
      # mint path if unset/unknown, so canonicalization STOPS rather than minting
      # under an undeclared gate. api-only. Launch value: PORTABLE_ONLY.
      - ARAMO_IDENTITY_ADMISSION_POLICY
      # Indeed Apply inbound webhook secret (SRC-1 PR-2 / R9). Bare-name
      # passthrough — a var read by container code but ABSENT here never reaches
      # the container, so the fix is inert (the D-AUTH-PLATFORM-HOSTS-1 defect
      # class). api-only. UNSET → the webhook refuses all traffic (503, dark).
      - ARAMO_INDEED_APPLY_WEBHOOK_SECRET
      # SRC-2 PR-3 (R7) — Indeed Job Sync partner OAuth credentials + connector
      # config. Bare-name passthroughs (the D-AUTH-PLATFORM-HOSTS-1 defect class).
      # api-only. UNSET client id/secret → the freshness sweep is fail-closed
      # (disabled, skips every tick). Scope/base default in code when unset.
      - ARAMO_INDEED_CLIENT_ID
      - ARAMO_INDEED_CLIENT_SECRET
      - ARAMO_INDEED_OAUTH_SCOPE
      - ARAMO_INDEED_GRAPHQL_BASE
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    # D1 image, UNCHANGED — referenced, not rebuilt.
    image: ${ARAMO_AUTH_IMAGE:-aramo/auth-service:local}
    container_name: aramo-prod-auth
    restart: unless-stopped
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aramo}:${POSTGRES_PASSWORD:-aramo}@postgres:5432/${POSTGRES_DB:-aramo}?schema=public
      # pass-through by name from the sourced shell env (multi-line-safe):
      - AUTH_AUDIENCE
      - AUTH_PRIVATE_KEY
      - AUTH_PUBLIC_KEY
      - AUTH_PKCE_STATE_KEY
      - AUTH_COGNITO_DOMAIN
      - AUTH_COGNITO_CLIENT_ID
      - AUTH_COGNITO_ISSUER
      - AUTH_COGNITO_REDIRECT_URI
      - AUTH_COGNITO_ENDPOINT
      - AUTH_POST_LOGIN_REDIRECT
      - AUTH_COGNITO_SIGNOUT_REDIRECT
      - AUTH_TRUSTED_IDP_NAMES
      - AUTH_ALLOW_INSECURE_COOKIES
      - AUTH_REFRESH_GRACE_SECONDS
      # Platform console — the platform host class (exact-match allowlist for
      # admin.aramo.ai). Without it the container reads AUTH_PLATFORM_HOSTS empty
      # → admin.aramo.ai fails the platform-host match → derives an unregistered
      # callback → console login 400s on redirect_uri (D-AUTH-PLATFORM-HOSTS-1).
      - AUTH_PLATFORM_HOSTS
      # Portal P1 — passwordless portal login. The portal host class
      # (exact-match allowlist for candidate.aramo.ai) + the magic-link base.
      - AUTH_PORTAL_HOSTS
      - PORTAL_LOGIN_BASE_URL
      # Eligibility rides aperture 1 (the PII-free fingerprint → ClusterFingerprint
      # lookup), so auth-service needs the SAME pepper as api. Single-sourced via
      # the *identity_pepper YAML anchor (defined on api's entry) — one var name,
      # one shell-.env value, cannot drift. loadIdentityAdmissionPolicy is NOT
      # needed here (auth-service reads the index, never mints into it).
      - *identity_pepper
      # Portal login mail rides the standing SES mailer path (SPF/DMARC/sandbox-exit
      # release-blocking, exactly as for TR-3).
      - MAILER_PROVIDER
      - SES_FROM_ADDRESS
    depends_on:
      postgres:
        condition: service_healthy

  platform-admin:
    # Inc-3 PR-3.3 — the platform-console backend as a real prod service.
    # Override ARAMO_PLATFORM_ADMIN_IMAGE to the GHCR tag on the box; defaults
    # to the local build tag. Caddy-internal only (never port-published; the
    # admin.aramo.ai site block is the sole ingress → platform-admin:3002).
    image: ${ARAMO_PLATFORM_ADMIN_IMAGE:-aramo/platform-admin:local}
    container_name: aramo-prod-platform-admin
    restart: unless-stopped
    environment:
      # PORT 3002 matches main.ts's default (api=3000, auth=3001).
      - PORT=3002
      - NODE_ENV=production
      # Same source as postgres/api → cannot drift.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aramo}:${POSTGRES_PASSWORD:-aramo}@postgres:5432/${POSTGRES_DB:-aramo}?schema=public
      # Env delta vs api (Inc-3 PR-3.3): platform-admin's module graph consumes
      # a strict subset of api's env PLUS the platform Cognito pool. It does NOT
      # boot the cross-schema BullMQ worker (that lives in api's directly-imported
      # CrossSchemaConsistencyModule), so NO REDIS_URL and no depends_on redis.
      # It runs no DNS module / no canonicalization, so no DNS_PROVIDER /
      # ARAMO_IDENTITY_PEPPER. It sends invites via Cognito AdminCreateUser (its
      # own hosted email), so no mailer / INVITE_* / S3 vars.
      #
      # JWT verification (JwtAuthGuard):
      - AUTH_AUDIENCE
      - AUTH_PUBLIC_KEY
      # Cognito admin invitations (CognitoAdminService). PLATFORM pool is NEW vs
      # api — platform-admin invitations mint into the platform user pool; the
      # TENANT pool is shared (tenant-owner invitations into a provisioned tenant).
      - AUTH_COGNITO_PLATFORM_USER_POOL_ID
      - AUTH_COGNITO_TENANT_USER_POOL_ID
      - AUTH_COGNITO_ENDPOINT
      # AWS SDK (Cognito-IDP client) — region + creds, same as api.
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: aramo-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aramo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aramo}
      POSTGRES_DB: ${POSTGRES_DB:-aramo}
    # NO ports: container-internal only (never exposed to host/network).
    volumes:
      - aramo-prod-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-aramo} -d ${POSTGRES_DB:-aramo}']
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: aramo-prod-redis
    restart: unless-stopped
    # NO ports: container-internal only (never exposed to host/network).
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  aramo-prod-pgdata:
  aramo-prod-caddy-data:
  aramo-prod-caddy-config:
